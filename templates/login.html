<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WOL Remote — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#080b0f;--surface:#0e1318;--border:#1a2230;--green:#00e5a0;--gbg:rgba(0,229,160,.07);--text:#c4d4e3;--dim:#4a6070;--r:12px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);pointer-events:none;z-index:9999}
    .blob{position:fixed;top:50%;left:50%;transform:translate(-50%,-60%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(0,229,160,.08) 0%,transparent 70%);pointer-events:none}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:48px 40px;width:100%;max-width:400px;text-align:center;position:relative;z-index:1;box-shadow:0 24px 60px rgba(0,0,0,.5)}
    .logo{width:56px;height:56px;border-radius:14px;background:var(--gbg);border:1px solid rgba(0,229,160,.2);display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
    .logo svg{width:26px;height:26px;color:var(--green)}
    h1{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:#fff;margin-bottom:8px}
    .sub{font-size:13px;color:var(--dim);margin-bottom:36px;line-height:1.6}
    .sub span{color:var(--green);font-family:'JetBrains Mono',monospace}
    .google-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:14px 24px;background:#fff;color:#1f1f1f;border:none;border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;text-decoration:none;transition:all .2s;box-shadow:0 4px 16px rgba(0,0,0,.3)}
    .google-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
    .google-btn img{width:20px;height:20px}
    .footer{margin-top:28px;font-size:11px;color:var(--dim);font-family:'JetBrains Mono',monospace;line-height:1.8}
    .divider{height:1px;background:var(--border);margin:28px 0}
    .features{display:flex;flex-direction:column;gap:8px;text-align:left}
    .feature{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--dim)}
    .feature svg{width:14px;height:14px;color:var(--green);flex-shrink:0}
  </style>
</head>
<body>
<div class="blob"></div>
<div class="card">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 12H3a9 9 0 1 0 18 0h-2"/><path d="M12 3v9l4 4"/>
    </svg>
  </div>
  <h1>WOL Remote</h1>
  <p class="sub">Enciende tus PCs desde cualquier lugar.<br/><span>UDP Magic Packet</span> vía internet.</p>

  <a href="/auth/google" class="google-btn">
    <img src="https://www.google.com/favicon.ico" alt="Google"/>
    Continuar con Google
  </a>

  <div class="divider"></div>

  <div class="features">
    <div class="feature">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      <span>Tus dispositivos guardados en tu cuenta</span>
    </div>
    <div class="feature">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      <span>Accede desde cualquier dispositivo</span>
    </div>
    <div class="feature">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      <span>Cada usuario tiene sus propios datos</span>
    </div>
  </div>

  <div class="footer">WOL Remote · Datos seguros por cuenta</div>
</div>
</body>
</html>
